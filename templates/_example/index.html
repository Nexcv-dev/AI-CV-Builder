<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <title>{{personalInfo.fullName}} CV</title>
  </head>
  <body>
    <main class="page">
      <header>
        <h1>{{personalInfo.fullName}}</h1>
        <p>{{personalInfo.email}} {{personalInfo.phone}}</p>
      </header>

      <section>
        <h2>Profile</h2>
        {{{personalInfo.summary}}}
      </section>

      <section>
        <h2>Experience</h2>
        {{#experience}}
          <article>
            <h3>{{position}}</h3>
            <p>{{company}} | {{startDate}} - {{endDate}}</p>
            {{{description}}}
          </article>
        {{/experience}}
      </section>
    </main>
  </body>
</html>
