# Configuration for GitHub Action: actions/labeler

frontend:
  - changed-files:
    - any-glob-to-any-file: 'apps/web/src/**/*'
    - all-globs-to-all-files: '!apps/web/src/**/*.test.*'
    - all-globs-to-all-files: '!apps/web/src/**/*.spec.*'

backend:
  - changed-files:
    - any-glob-to-any-file: 'apps/api/**/*.ts'

tests:
  - changed-files:
    - any-glob-to-any-file: 
      - 'apps/api/tests/**/*'
      - 'apps/web/tests/**/*'
      - 'apps/web/src/**/*.test.*'
      - 'apps/web/src/**/*.spec.*'

config:
  - changed-files:
    - any-glob-to-any-file:
      - 'apps/web/package.json'
      - 'apps/api/package.json'
      - 'apps/web/vite.config.ts'
      - 'apps/web/tsconfig.json'
      - 'apps/api/tsconfig.json'
      - '.env*'
      - '.gitignore'

documentation:
  - changed-files:
    - any-glob-to-any-file:
      - 'README.md'
      - '**/*.md'

assets:
  - changed-files:
    - any-glob-to-any-file: 'apps/web/public/**/*'
