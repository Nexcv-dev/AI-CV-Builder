name: MongoDB Daily Backup

on:
  schedule:
    # Runs daily at 02:00 Asia/Colombo (20:30 UTC).
    - cron: "30 20 * * *"
  workflow_dispatch:

env:
  S3_BUCKET: ${{ vars.MONGODB_BACKUP_S3_BUCKET || 'mongodb-database-backup1' }}
  S3_PREFIX: ${{ vars.MONGODB_BACKUP_S3_PREFIX || 'mongodb/daily' }}
  MONGODB_TOOLS_VERSION: "100.13.0"

jobs:
  backup:
    name: Dump MongoDB and upload to S3
    runs-on: ubuntu-24.04
    environment: production
    timeout-minutes: 30

    steps:
      - name: Install MongoDB Database Tools
        run: |
          set -euo pipefail
          curl -fsSL "https://fastdl.mongodb.org/tools/db/mongodb-database-tools-ubuntu2404-x86_64-${MONGODB_TOOLS_VERSION}.deb" -o mongodb-database-tools.deb
          sudo apt-get update
          sudo apt-get install -y ./mongodb-database-tools.deb
          mongodump --version

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.BACKUP_AWS_ACCESS_KEY_ID || secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.BACKUP_AWS_SECRET_ACCESS_KEY || secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.BACKUP_AWS_REGION || vars.BACKUP_AWS_REGION || secrets.AWS_REGION || 'eu-north-1' }}

      - name: Show AWS backup target
        run: |
          set -euo pipefail
          echo "AWS identity: $(aws sts get-caller-identity --query Arn --output text)"
          echo "Backup target: s3://${S3_BUCKET}/${S3_PREFIX}/"

      - name: Create MongoDB backup archive
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          TZ: Asia/Colombo
        run: |
          set -euo pipefail
          if [ -z "${MONGODB_URI}" ]; then
            echo "MONGODB_URI secret is missing."
            exit 1
          fi

          BACKUP_NAME="mongodb-$(date +'%Y-%m-%d_%H-%M-%S')-asia-colombo.archive.gz"
          BACKUP_FILE="/tmp/${BACKUP_NAME}"

          mongodump --uri="${MONGODB_URI}" --archive="${BACKUP_FILE}" --gzip
          test -s "${BACKUP_FILE}"

          echo "BACKUP_NAME=${BACKUP_NAME}" >> "${GITHUB_ENV}"
          echo "BACKUP_FILE=${BACKUP_FILE}" >> "${GITHUB_ENV}"

      - name: Upload backup to S3
        run: |
          set -euo pipefail
          if [ -z "${BACKUP_FILE:-}" ] || [ -z "${BACKUP_NAME:-}" ]; then
            echo "Backup file environment was not created."
            exit 1
          fi
          aws s3 cp "${BACKUP_FILE}" "s3://${S3_BUCKET}/${S3_PREFIX}/${BACKUP_NAME}" --sse AES256

      - name: Remove local backup archive
        if: always()
        run: |
          rm -f "${BACKUP_FILE:-}"
