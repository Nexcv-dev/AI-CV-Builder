name: CI/CD Pipeline

on:
  push:
    branches: [ '**' ]
  pull_request:
    branches: [ '**' ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    environment: production

    defaults:
      run:
        working-directory: './Free CV Builder'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: './Free CV Builder/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm run test:run

      - name: Build
        run: npm run build

      - name: Configure AWS credentials
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && success()
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-north-1

      - name: Sync CV templates to S3
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && success()
        working-directory: '.'
        run: |
          if [ -d "templates" ]; then
            aws s3 sync templates s3://cv-template-bucket/templates --delete
          else
            echo "No templates directory found; skipping S3 sync."
          fi

      - name: Build PDF Lambda zip
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && success()
        run: npm run build:pdf-lambda

      - name: Upload PDF Lambda zip to S3
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && success()
        working-directory: '.'
        run: |
          aws s3 rm s3://cv-template-bucket/lambda/nexcv-pdf-lambda.zip || true
          aws s3 cp "Free CV Builder/lambda-pdf/dist/nexcv-pdf-lambda.zip" s3://cv-template-bucket/lambda/nexcv-pdf-lambda.zip

      - name: Update PDF Lambda function
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && success()
        run: |
          aws lambda update-function-code \
            --function-name PDF-generation \
            --s3-bucket cv-template-bucket \
            --s3-key lambda/nexcv-pdf-lambda.zip

      - name: Build Docker image
        run: |
          docker build -t ai-cv-builder:latest .

      - name: Deploy to Render
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && success()
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"
