name: CI/CD Pipeline

on:
  push:
    branches: [ '**' ]
  pull_request:
    branches: [ '**' ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Enable pnpm
        run: corepack enable

      - name: Get pnpm store path
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(corepack pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Lint
        run: corepack pnpm lint

      - name: Run tests
        run: corepack pnpm test:run

      - name: Build
        run: corepack pnpm build

      - name: Configure AWS credentials
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && success()
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-north-1

      - name: Sync CV templates to S3
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && success()
        working-directory: '.'
        run: |
          if [ -d "templates" ]; then
            aws s3 sync templates s3://cv-template-bucket/templates --delete
          else
            echo "No templates directory found; skipping S3 sync."
          fi

      - name: Build PDF Lambda zip
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && success()
        run: corepack pnpm build:pdf-lambda

      - name: Build worker Lambda zips
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && success()
        run: corepack pnpm build:workers

      - name: Upload PDF Lambda zip to S3
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && success()
        working-directory: '.'
        run: |
          aws s3 rm s3://cv-template-bucket/lambda/nexcv-pdf-lambda.zip || true
          aws s3 cp "apps/workers/pdf-lambda/dist/nexcv-pdf-lambda.zip" s3://cv-template-bucket/lambda/nexcv-pdf-lambda.zip

      - name: Update PDF Lambda function
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && success()
        run: |
          aws lambda update-function-code \
            --function-name PDF-generation \
            --s3-bucket cv-template-bucket \
            --s3-key lambda/nexcv-pdf-lambda.zip

      - name: Build Docker image
        run: |
          for attempt in 1 2 3; do
            if docker build -f apps/web/Dockerfile -t ai-cv-builder:latest .; then
              exit 0
            fi
            if [ "$attempt" -eq 3 ]; then
              exit 1
            fi
            echo "Docker build failed on attempt $attempt; retrying..."
            sleep $((attempt * 20))
          done

      - name: Deploy to Render
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && success()
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"
