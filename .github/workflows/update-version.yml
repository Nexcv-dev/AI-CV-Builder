name: Sync Version

on:
  release:
    types: [published]

jobs:
  update-version:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.target_commitish }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: get_version
        run: |
          # Get the tag name (e.g., v1.2.3) and remove the 'v' prefix (1.2.3)
          TAG_NAME="${{ github.event.release.tag_name }}"
          VERSION="${TAG_NAME#v}"
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Update package.json version
        run: |
          cd "Free CV Builder"
          # Update the package.json version without creating a git tag (we already have a release tag)
          npm version ${{ steps.get_version.outputs.VERSION }} --no-git-tag-version

      - name: Commit and Push Changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: bump version to ${{ steps.get_version.outputs.VERSION }}"
          file_pattern: "Free CV Builder/package.json Free CV Builder/package-lock.json"
