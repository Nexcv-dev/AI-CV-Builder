services:
  - type: web
    name: free-ai-cv-builder
    env: node
    rootDir: "Free CV Builder"
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: GEMINI_API_KEY
        sync: false
      - key: ALLOWED_ORIGIN
        sync: false
